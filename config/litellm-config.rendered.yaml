model_list:
  - model_name: local-fast
    litellm_params:
      # The upstream model id MUST match what mlx_lm.server exposes via
      # /v1/models. We point at the Hugging Face id form because the absolute
      # filesystem path form has slashes that confuse some clients.
      model: openai/mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
      api_base: http://127.0.0.1:8081/v1
      api_key: not-needed
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-long
    litellm_params:
      model: ollama/qwen3-coder-next:q4_K_M
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # Tool-capable agent model. Pull beforehand:
  #   ollama pull llama3.1:8b-instruct-q8_0
  # Unlike local-long, llama3.1 reliably emits the <tool_call> envelope
  # Ollama parses into structured `tool_calls`, so Cursor's agent UI
  # renders progress correctly instead of showing raw JSON in chat.
  - model_name: local-agent
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q8_0
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  # Qwen2.5-Coder candidates pulled for the Cline replay benchmark.
  # Both speak ollama_chat/ so structured tool_calls work, though Cline
  # only consumes the assistant message text (XML-encoded tools), so
  # these are useful primarily for instruction-following quality.
  - model_name: local-coder-14b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: local-coder-32b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: claude-code
    # Default tier for the hybrid-auto router when it escalates to Claude.
    # Pinned to Opus 4.7 -- the most capable model. Override per-turn
    # with [haiku] / [sonnet] tags. cost.db pricing comes from
    # cost/pricing.py; the values below only affect LiteLLM's internal
    # /spend bookkeeping and are kept in sync as a courtesy.
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  # Per-tier Claude aliases (targets of [haiku]/[sonnet]/[opus] inline tags).
  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000005

  - model_name: claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015

  - model_name: claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  - model_name: hybrid-auto
    # Magic alias: the size-based router rewrites `data["model"]` to one of
    # the three real groups above before LiteLLM dispatches upstream, so the
    # upstream params here are never actually used. We keep them harmless.
    litellm_params:
      model: openai/mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
      api_base: http://127.0.0.1:8081/v1
      api_key: not-needed

  # ----------------------------------------------------------------------
  # gpt-* aliases for Cursor (see template for rationale)
  # ----------------------------------------------------------------------
  - model_name: gpt-local-fast
    litellm_params:
      model: openai/mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
      api_base: http://127.0.0.1:8081/v1
      api_key: not-needed
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-local-long
    litellm_params:
      model: ollama/qwen3-coder-next:q4_K_M
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-local-agent
    litellm_params:
      model: ollama_chat/llama3.1:8b-instruct-q8_0
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-local-coder-14b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:14b
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-local-coder-32b
    litellm_params:
      model: ollama_chat/qwen2.5-coder:32b
      api_base: http://127.0.0.1:11434
      input_cost_per_token: 0.0
      output_cost_per_token: 0.0

  - model_name: gpt-claude-code
    # Cursor-shaped mirror of `claude-code`. Same upstream model.
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  # Cursor-shaped mirrors of the per-tier Claude aliases.
  - model_name: gpt-claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000001
      output_cost_per_token: 0.000005

  - model_name: gpt-claude-sonnet-4-6
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000003
      output_cost_per_token: 0.000015

  - model_name: gpt-claude-opus-4-7
    litellm_params:
      model: anthropic/claude-opus-4-7
      api_key: os.environ/ANTHROPIC_API_KEY
      input_cost_per_token: 0.000005
      output_cost_per_token: 0.000025

  - model_name: gpt-hybrid-auto
    litellm_params:
      model: openai/mlx-community/Qwen2.5-Coder-7B-Instruct-4bit
      api_base: http://127.0.0.1:8081/v1
      api_key: not-needed

litellm_settings:
  drop_params: true
  callbacks: ["router.route_by_size.proxy_handler_instance"]
  success_callback: ["router.route_by_size.proxy_handler_instance"]
  database_url: "sqlite:///./cost/cost.db"
  set_verbose: false

general_settings:
  master_key: sk-litellm-REDACTED-PRE-ROTATION
